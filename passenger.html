<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Bus</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f0f0;
    padding: 20px;
}

/* MAIN CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: 0 auto;
}

/* BIG SELECTS */
select {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* BIG BUTTON */
button {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: #0a2a66;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

button:active {
    background: #1a3a76;
}

/* RESPONSE BOX */
#statusBox {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
    min-height: 60px;
    padding: 10px;
    border-radius: 8px;
    background: #f8f8f8;
}
</style>

</head>

<body>

<div class="card">

<h2>🚏 Request a Bus</h2>

<select id="from">
  <option>Saliña</option>
  <option>Punda</option>
  <option>Otrabanda</option>
</select>

<select id="to">
  <option>Punda</option>
  <option>Saliña</option>
  <option>Otrabanda</option>
</select>

<button onclick="sendRequest()">📢 Send Request</button>

<div id="statusBox">Ready to request 🚍</div>

</div>

<script>

let requestTime = null;
let responseChecked = false;

function sendRequest() {

    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    if (from === to) {
        document.getElementById("statusBox").innerHTML = "⚠️ Pick different locations!";
        return;
    }

    // Generate unique ID using timestamp + random
    requestTime = new Date().toISOString();
    responseChecked = false;

    const statusBox = document.getElementById("statusBox");
    statusBox.innerHTML = "⏳ Request sent... waiting for driver...";

    fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            type: "request",
            from: from,
            to: to,
            time: requestTime  // Send the time with the request
        })
    })
    .then(response => response.json())
    .then(data => {
        console.log("Request sent:", data);
    })
    .catch(error => {
        statusBox.innerHTML = "❌ Error sending request";
        console.error(error);
    });
}

/* CHECK DRIVER RESPONSE */
async function checkResponse() {

    if (!requestTime || responseChecked) return;

    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec");
        const data = await res.json();

        const statusBox = document.getElementById("statusBox");

        // Look for our specific request by time
        const ourRequest = data.find(item => item.time === requestTime);

        if (ourRequest) {
            if (ourRequest.response === "wait") {
                statusBox.innerHTML = "✅ Driver is coming your way! 🚍<br><small style='color:#2ecc71;'>Your driver will arrive shortly</small>";
                responseChecked = true;
            } else if (ourRequest.response === "pass") {
                statusBox.innerHTML = "❌ No driver available right now<br><small style='color:#e74c3c;'>Try again in a few minutes</small>";
                responseChecked = true;
            }
        }

        // Check if request is too old (> 5 minutes)
        const now = new Date();
        const past = new Date(requestTime);
        const diffMinutes = (now - past) / 1000 / 60;
        
        if (diffMinutes > 5 && !responseChecked) {
            statusBox.innerHTML = "⏰ Request timed out<br><small>No driver responded. Please try again.</small>";
            requestTime = null;
        }

    } catch(e) {
        console.error("Error checking response:", e);
    }
}

/* AUTO CHECK every 3 seconds (faster) */
setInterval(checkResponse, 3000);

</script>

</body>
</html>

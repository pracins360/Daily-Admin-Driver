<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Bus</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f0f0;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: 0 auto;
}

select {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: #0a2a66;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

#statusBox {
    margin-top: 20px;
    font-size: 18px;
    min-height: 60px;
    padding: 10px;
    border-radius: 8px;
    background: #f8f8f8;
}

#debug {
    background: #fff3cd;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 12px;
    max-height: 100px;
    overflow: auto;
    text-align: left;
    display: none;
}
</style>

</head>

<body>

<div class="card">

<h2>🚏 Request a Bus</h2>

<select id="from">
  <option>Saliña</option>
  <option>Punda</option>
  <option>Otrabanda</option>
</select>

<select id="to">
  <option>Punda</option>
  <option>Saliña</option>
  <option>Otrabanda</option>
</select>

<button onclick="sendRequest()">📢 Send Request</button>

<div id="statusBox">Ready to request 🚍</div>
<div id="debug"></div>

</div>

<script>

// REPLACE WITH YOUR URL
const API_URL = "https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec";

let requestTime = null;

function logDebug(msg) {
    const debug = document.getElementById('debug');
    debug.style.display = 'block';
    debug.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '\n';
    debug.scrollTop = debug.scrollHeight;
    console.log(msg);
}

function sendRequest() {
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    if (from === to) {
        document.getElementById("statusBox").innerHTML = "⚠️ Pick different locations!";
        return;
    }

    requestTime = new Date().toISOString();
    const statusBox = document.getElementById("statusBox");
    statusBox.innerHTML = "⏳ Sending request...";

    logDebug('Sending request: ' + from + ' → ' + to);

    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            type: "request",
            from: from,
            to: to
        })
    })
    .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    })
    .then(data => {
        logDebug('Request sent: ' + JSON.stringify(data));
        statusBox.innerHTML = "⏳ Request sent... waiting for driver...";
        // Start checking for response
        checkResponse();
    })
    .catch(error => {
        logDebug('❌ Error: ' + error.message);
        statusBox.innerHTML = "❌ Error sending request<br><small>" + error.message + "</small>";
    });
}

async function checkResponse() {
    if (!requestTime) return;

    try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        
        const data = await res.json();
        const statusBox = document.getElementById("statusBox");

        // Find our request
        const ourRequest = data.find(item => item.time === requestTime);

        if (ourRequest) {
            if (ourRequest.response === "wait") {
                statusBox.innerHTML = "✅ Driver is coming! 🚍";
                logDebug('Driver said WAIT');
                requestTime = null;
            } else if (ourRequest.response === "pass") {
                statusBox.innerHTML = "❌ No driver available";
                logDebug('Driver said PASS');
                requestTime = null;
            }
        }

        // Check timeout (5 minutes)
        const now = new Date();
        const past = new Date(requestTime);
        const diffMinutes = (now - past) / 1000 / 60;
        
        if (diffMinutes > 5) {
            statusBox.innerHTML = "⏰ Request timed out";
            requestTime = null;
        }

    } catch(e) {
        logDebug('Check error: ' + e.message);
    }
}

// Check every 3 seconds
setInterval(checkResponse, 3000);

logDebug('🚏 Passenger panel started');
logDebug('API URL: ' + API_URL);

</script>

</body>
</html>

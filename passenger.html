<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Bus</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f0f0;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: 0 auto;
}

select {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

button {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: #0a2a66;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

#statusBox {
    margin-top: 20px;
    font-size: 18px;
    min-height: 60px;
    padding: 10px;
    border-radius: 8px;
    background: #f8f8f8;
}

#messageBox {
    background: #fff3cd;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: 2px solid #ffc107;
    display: none;
    font-size: 14px;
}

#messageBox.error {
    background: #f8d7da;
    border-color: #dc3545;
    color: #721c24;
}

#messageBox.success {
    background: #d4edda;
    border-color: #28a745;
    color: #155724;
}
</style>

</head>

<body>

<div class="card">

<h2>🚏 Request a Bus</h2>

<select id="from">
  <option>Saliña</option>
  <option>Punda</option>
  <option>Otrabanda</option>
</select>

<select id="to">
  <option>Punda</option>
  <option>Saliña</option>
  <option>Otrabanda</option>
</select>

<button onclick="sendRequest()">📢 Send Request</button>

<div id="statusBox">Ready to request 🚍</div>
<div id="messageBox"></div>

</div>

<script>

// 🔥 YOUR URL HERE - ONLY ONE PLACE
const API_URL = "https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec";

let requestTime = null;

function showMessage(text, type = "info") {
    const box = document.getElementById("messageBox");
    box.style.display = "block";
    box.className = type;
    box.innerHTML = text;
    
    if (type !== "error") {
        setTimeout(() => {
            box.style.display = "none";
        }, 8000);
    }
}

function sendRequest() {
    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    if (from === to) {
        showMessage("⚠️ Pick different locations!", "error");
        document.getElementById("statusBox").innerHTML = "⚠️ Pick different locations!";
        return;
    }

    requestTime = new Date().toISOString();
    const statusBox = document.getElementById("statusBox");
    statusBox.innerHTML = "⏳ Sending request...";
    showMessage("Sending request: " + from + " → " + to, "info");

    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            type: "request",
            from: from,
            to: to
        })
    })
    .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    })
    .then(data => {
        showMessage("✅ Request sent successfully!", "success");
        statusBox.innerHTML = "⏳ Waiting for driver response...";
        checkResponse();
    })
    .catch(error => {
        showMessage("❌ Error: " + error.message + ". Check if script is deployed.", "error");
        statusBox.innerHTML = "❌ Error sending request";
    });
}

async function checkResponse() {
    if (!requestTime) return;

    try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        
        const data = await res.json();
        const statusBox = document.getElementById("statusBox");

        const ourRequest = data.find(item => item.time === requestTime);

        if (ourRequest) {
            if (ourRequest.response === "wait") {
                statusBox.innerHTML = "✅ Driver is coming! 🚍";
                showMessage("✅ Driver is on the way!", "success");
                requestTime = null;
            } else if (ourRequest.response === "pass") {
                statusBox.innerHTML = "❌ No driver available";
                showMessage("❌ No driver available right now", "error");
                requestTime = null;
            }
        }

        const now = new Date();
        const past = new Date(requestTime);
        const diffMinutes = (now - past) / 1000 / 60;
        
        if (diffMinutes > 5 && requestTime) {
            statusBox.innerHTML = "⏰ Request timed out";
            showMessage("⏰ Request timed out - no driver responded", "error");
            requestTime = null;
        }

    } catch(e) {
        showMessage("Error checking response: " + e.message, "error");
    }
}

// Check every 3 seconds
setInterval(checkResponse, 3000);
showMessage("🚏 Ready to request a bus", "info");

</script>

</body>
</html>

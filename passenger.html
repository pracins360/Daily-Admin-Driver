<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request a Bus</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f0f0f0;
    padding: 20px;
}

/* MAIN CARD */
.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    max-width: 400px;
    margin: 0 auto;
}

/* BIG SELECTS */
select {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

/* BIG BUTTON */
button {
    width: 100%;
    padding: 18px;
    font-size: 20px;
    background: #0a2a66;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

button:active {
    background: #1a3a76;
}

/* RESPONSE BOX */
#statusBox {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
    min-height: 30px;
}
</style>

</head>

<body>

<div class="card">

<h2>🚏 Request a Bus</h2>

<select id="from">
  <option>Saliña</option>
  <option>Punda</option>
  <option>Otrabanda</option>
</select>

<select id="to">
  <option>Punda</option>
  <option>Saliña</option>
  <option>Otrabanda</option>
</select>

<button onclick="sendRequest()">Send Request</button>

<div id="statusBox"></div>

</div>

<script>

let requestTime = null;
let myRequestId = null;

function sendRequest() {

    const from = document.getElementById("from").value;
    const to = document.getElementById("to").value;

    if (from === to) {
        document.getElementById("statusBox").innerText = "⚠️ Pick different locations!";
        return;
    }

    myRequestId = new Date().toISOString();
    requestTime = myRequestId;

    fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            type: "request",
            from: from,
            to: to
        })
    });

    document.getElementById("statusBox").innerText =
        "⏳ Request sent... waiting for driver...";
}

/* CHECK DRIVER RESPONSE */
async function checkResponse() {

    if (!requestTime) return;

    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec");
        const data = await res.json();

        let found = false;

        data.forEach(item => {
            // Check if this is our request by matching time
            if (item.time === requestTime) {
                found = true;
                if (item.response === "wait") {
                    document.getElementById("statusBox").innerHTML = 
                        "✅ Driver is coming your way! 🚍<br><small style='color:#2ecc71;'>Your driver will arrive shortly</small>";
                } else if (item.response === "pass") {
                    document.getElementById("statusBox").innerHTML = 
                        "❌ No driver available right now<br><small style='color:#e74c3c;'>Try again in a few minutes</small>";
                }
            }
        });

        // If request is more than 5 minutes old and no response, show timeout
        const now = new Date();
        const past = new Date(requestTime);
        const diffMinutes = (now - past) / 1000 / 60;
        
        if (diffMinutes > 5 && !found) {
            document.getElementById("statusBox").innerHTML = 
                "⏰ Request timed out<br><small>No driver responded. Please try again.</small>";
            requestTime = null;
        }

    } catch(e) {
        console.error("Error checking response:", e);
    }
}

/* AUTO CHECK every 5 seconds */
setInterval(checkResponse, 5000);

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Panel</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f0f0f0;
}

.header {
    background: #0a2a66;
    color: white;
    text-align: center;
    padding: 10px;
}

.requests {
    background: white;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.request-card {
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
}

.request-buttons button {
    margin: 5px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.wait-btn { background: #2ecc71; color: white; }
.pass-btn { background: #e74c3c; color: white; }

.route {
    text-align: center;
    margin: 10px;
}

.route button {
    padding: 10px 15px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    background: #ddd;
    cursor: pointer;
}

.active-route {
    background: #0a2a66;
    color: white;
}

.board {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

.board button {
    font-size: 22px;
    padding: 20px;
    border-radius: 12px;
    border: none;
    background: #ffd700;
    font-weight: bold;
    cursor: pointer;
}

.status {
    text-align: center;
    padding: 10px;
    font-size: 18px;
    font-weight: bold;
}

#debug {
    background: #fff3cd;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    font-family: monospace;
    font-size: 12px;
    max-height: 100px;
    overflow: auto;
    display: none;
}
</style>

</head>
<body>

<div class="header">
    🚍 Driver Panel
</div>

<!-- 🔥 PASSENGER REQUESTS -->
<div class="requests">
    <h3>📢 Passenger Requests</h3>
    <div id="requestList">Loading requests...</div>
</div>

<!-- 🛑 ROUTE -->
<div class="route">
    <b>Route:</b><br>
    <button onclick="setRoute('Busstation')" id="busBtn">Busstation</button>
    <button onclick="setRoute('Destination')" id="destBtn">Destination</button>
</div>

<!-- 💰 TARIFF BOARD -->
<div class="board">
    <button onclick="tapFare(2.00)">2.00</button>
    <button onclick="tapFare(2.70)">2.70</button>
    <button onclick="tapFare(2.90)">2.90</button>
    <button onclick="tapFare(3.20)">3.20</button>
    <button onclick="tapFare(3.50)">3.50</button>
</div>

<!-- 📊 LIVE STATUS -->
<div class="status" id="status">
    Passengers: 0 | Income: 0
</div>

<!-- Debug Console -->
<div id="debug"></div>

<script>

// REPLACE THIS WITH YOUR DEPLOYED URL
const API_URL = "https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec";

let currentRoute = "Busstation";
let passengers = 0;
let income = 0;
let lastRequests = [];

function logDebug(message) {
    const debug = document.getElementById('debug');
    debug.style.display = 'block';
    debug.innerHTML += new Date().toLocaleTimeString() + ': ' + message + '\n';
    debug.scrollTop = debug.scrollHeight;
    console.log(message);
}

/* ✅ ROUTE SELECT */
function setRoute(route) {
    currentRoute = route;
    const bus = document.getElementById("busBtn");
    const dest = document.getElementById("destBtn");
    bus.classList.remove("active-route");
    dest.classList.remove("active-route");
    if(route === "Busstation"){
        bus.classList.add("active-route");
    } else {
        dest.classList.add("active-route");
    }
    logDebug('Route changed to: ' + route);
}

/* ✅ TAP PASSENGER */
function tapFare(fare) {
    passengers++;
    income += fare;
    document.getElementById("status").innerText =
        `Passengers: ${passengers} | Income: ${income.toFixed(2)}`;

    logDebug('Tapping fare: ' + fare);
    
    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            type: "tap",
            tariff: fare,
            route: currentRoute
        })
    })
    .then(res => res.json())
    .then(data => {
        logDebug('Tap response: ' + JSON.stringify(data));
    })
    .catch(error => {
        logDebug('❌ Tap error: ' + error.message);
    });
}

/* ✅ LOAD REQUESTS */
async function loadRequests() {
    try {
        logDebug('Loading requests...');
        const res = await fetch(API_URL);
        
        if (!res.ok) {
            throw new Error('HTTP ' + res.status + ': ' + res.statusText);
        }
        
        const data = await res.json();
        logDebug('Received ' + (data ? data.length : 0) + ' requests');

        const list = document.getElementById("requestList");

        if (!data || data.length === 0) {
            list.innerHTML = "✅ No active requests";
            return;
        }

        // Only show requests with NO response yet
        const activeRequests = data.filter(req => !req.response || req.response === "");
        
        if (activeRequests.length === 0) {
            list.innerHTML = "✅ No pending requests (all responded)";
            return;
        }

        lastRequests = activeRequests;
        let html = "";
        activeRequests.slice(0, 10).forEach((req, index) => {
            html += `
                <div class="request-card">
                    📍 ${req.from} → ${req.to}<br>
                    ⏱ ${timeAgo(req.time)}
                    <div class="request-buttons">
                        <button class="wait-btn" onclick="respond('wait', ${index})">✅ WAIT</button>
                        <button class="pass-btn" onclick="respond('pass', ${index})">❌ PASS</button>
                    </div>
                </div>
            `;
        });
        list.innerHTML = html;

    } catch(e) {
        logDebug('❌ Load error: ' + e.message);
        document.getElementById("requestList").innerHTML = 
            '❌ Error loading: ' + e.message + '<br><small>Check console and deploy URL</small>';
    }
}

function timeAgo(timestamp) {
    if (!timestamp) return "Just now";
    const now = new Date();
    const past = new Date(timestamp);
    const diffMinutes = Math.floor((now - past) / 1000 / 60);
    if (diffMinutes < 1) return "Just now";
    if (diffMinutes === 1) return "1 min ago";
    return `${diffMinutes} mins ago`;
}

/* ✅ DRIVER RESPONSE */
function respond(type, index) {
    const req = lastRequests[index];
    if (!req) {
        alert("⚠️ Request not found");
        return;
    }

    logDebug('Responding to request: ' + req.from + '→' + req.to + ' with ' + type);

    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            type: "response",
            time: req.time,
            response: type
        })
    })
    .then(res => res.json())
    .then(data => {
        logDebug('Response saved: ' + JSON.stringify(data));
        if(type === "wait"){
            alert("✅ You are going this way");
        } else {
            alert("❌ Skipped request");
        }
        loadRequests();
    })
    .catch(error => {
        logDebug('❌ Response error: ' + error.message);
        alert("⚠️ Error sending response: " + error.message);
    });
}

/* ✅ TEST REQUEST */
function testRequest() {
    logDebug('Sending test request...');
    
    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            type: "request",
            from: "Saliña",
            to: "Punda"
        })
    })
    .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    })
    .then(data => {
        logDebug('Test request sent: ' + JSON.stringify(data));
        alert("✅ Test request sent!");
        loadRequests();
    })
    .catch(error => {
        logDebug('❌ Test request error: ' + error.message);
        alert("⚠️ Error sending test request: " + error.message + "\n\nCheck:\n1. Script deployed as web app\n2. URL is correct\n3. Sheet 'requests' exists");
    });
}

/* ✅ INIT */
logDebug('🚍 Driver panel started');
logDebug('API URL: ' + API_URL);

setInterval(loadRequests, 5000);
loadRequests();
setRoute("Busstation");

// Add test button
const testBtn = document.createElement('button');
testBtn.innerHTML = '🧪 Test Request';
testBtn.style.cssText = 'position:fixed; bottom:10px; right:10px; padding:10px 20px; background:#ffd700; border:none; border-radius:8px; font-weight:bold; cursor:pointer; z-index:999; box-shadow: 0 2px 8px rgba(0,0,0,0.2);';
testBtn.onclick = testRequest;
document.body.appendChild(testBtn);

</script>
</body>
</html>

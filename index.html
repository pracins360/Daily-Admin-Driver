<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Panel</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f0f0f0;
}

/* HEADER */
.header {
    background: #0a2a66;
    color: white;
    text-align: center;
    padding: 10px;
}

/* REQUEST SECTION */
.requests {
    background: white;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.request-card {
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
}

.request-buttons button {
    margin: 5px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
}

.wait-btn { background: #2ecc71; color: white; }
.pass-btn { background: #e74c3c; color: white; }

/* ROUTE TOGGLE */
.route {
    text-align: center;
    margin: 10px;
}

.route button {
    padding: 10px 15px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    background: #ddd;
}

.active-route {
    background: #0a2a66;
    color: white;
}

/* TARIFF BOARD */
.board {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

.board button {
    font-size: 22px;
    padding: 20px;
    border-radius: 12px;
    border: none;
    background: #ffd700;
    font-weight: bold;
}

/* STATUS */
.status {
    text-align: center;
    padding: 10px;
    font-size: 18px;
    font-weight: bold;
}
</style>

</head>
<body>

<div class="header">
    🚍 Driver Panel
</div>

<!-- 🔥 PASSENGER REQUESTS -->
<div class="requests">
    <h3>📢 Passenger Requests</h3>

    <div id="requestList">
        Loading requests...
    </div>
</div>

<!-- 🛑 ROUTE -->
<div class="route">
    <b>Route:</b><br>
    <button onclick="setRoute('Busstation')" id="busBtn">Busstation</button>
    <button onclick="setRoute('Destination')" id="destBtn">Destination</button>
</div>

<!-- 💰 TARIFF BOARD -->
<div class="board">
    <button onclick="tapFare(2.00)">2.00</button>
    <button onclick="tapFare(2.70)">2.70</button>
    <button onclick="tapFare(2.90)">2.90</button>
    <button onclick="tapFare(3.20)">3.20</button>
    <button onclick="tapFare(3.50)">3.50</button>
</div>

<!-- 📊 LIVE STATUS -->
<div class="status" id="status">
    Passengers: 0 | Income: 0
</div>

<script>

let currentRoute = "Busstation";
let passengers = 0;
let income = 0;
    let lastRequests = [];

/* ✅ ROUTE SELECT */
function setRoute(route) {
    currentRoute = route;

    const bus = document.getElementById("busBtn");
    const dest = document.getElementById("destBtn");

    bus.classList.remove("active-route");
    dest.classList.remove("active-route");

    if(route === "Busstation"){
        bus.classList.add("active-route");
    } else {
        dest.classList.add("active-route");
    }
}

/* ✅ TAP PASSENGER */
function tapFare(fare) {
    passengers++;
    income += fare;

    document.getElementById("status").innerText =
        `Passengers: ${passengers} | Income: ${income.toFixed(2)}`;

    fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec", {
        method: "POST",
       headers: {4    "Content-Type": "application/json"5  },
        body: JSON.stringify({
            type: "tap",
            tariff: fare,
            route: currentRoute
        })
    });
}
let lastRequests = [];

/* ✅ LOAD REQUESTS */
async function loadRequests() {
    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec");
        const data = await res.json();

        const list = document.getElementById("requestList");

        let html = "";

        if (data.length === 0) {
            list.innerHTML = "No active requests";
            return;
        }

        lastRequests = data;

        data.slice(0,5).forEach((req, index) => {
            html += `
                <div class="request-card">
                    📍 ${req.from} → ${req.to}<br>
                    ⏱ ${timeAgo(req.time)}

                    <div class="request-buttons">
                        <button class="wait-btn" onclick="respond('wait', ${index})">WAIT</button>
                        <button class="pass-btn" onclick="respond('pass', ${index})">PASS</button>
                    </div>
                </div>
            `;
        });

        list.innerHTML = html;

    } catch(e) {
        document.getElementById("requestList").innerText = "Error loading requests";
    }
}

/* ✅ DRIVER RESPONSE */
function respond(type, index) {

    const req = lastRequests[index];

    fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec", {
        method: "POST",
        body: JSON.stringify({
            type: "response",
            time: req.time,
            response: type
        })
    });

    if(type === "wait"){
        alert("✅ You are going this way");
    } else {
        alert("❌ Skipped request");
    }

}

/* ✅ TEST REQUEST */
function testRequest() {
    fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec", {
        method: "POST",
        body: JSON.stringify({
            type: "request",
            from: "Saliña",
            to: "Punda"
        })
    });

    alert("✅ Test request sent!");
}

/* ✅ AUTO LOAD */
setInterval(loadRequests, 10000);
loadRequests();
setRoute("Busstation");
</script>

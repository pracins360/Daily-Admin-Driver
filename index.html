<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Panel</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f0f0f0;
}

.header {
    background: #0a2a66;
    color: white;
    text-align: center;
    padding: 10px;
}

.requests {
    background: white;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
}

.request-card {
    border: 1px solid #ddd;
    padding: 10px;
    margin-bottom: 8px;
    border-radius: 8px;
}

.request-buttons button {
    margin: 5px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.wait-btn { background: #2ecc71; color: white; }
.pass-btn { background: #e74c3c; color: white; }

.route {
    text-align: center;
    margin: 10px;
}

.route button {
    padding: 10px 15px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    background: #ddd;
    cursor: pointer;
}

.active-route {
    background: #0a2a66;
    color: white;
}

.board {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    padding: 10px;
}

.board button {
    font-size: 22px;
    padding: 20px;
    border-radius: 12px;
    border: none;
    background: #ffd700;
    font-weight: bold;
    cursor: pointer;
}

.status {
    text-align: center;
    padding: 10px;
    font-size: 18px;
    font-weight: bold;
}

#messageBox {
    background: #fff3cd;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: 2px solid #ffc107;
    font-family: Arial;
    font-size: 14px;
    display: none;
}

#messageBox.error {
    background: #f8d7da;
    border-color: #dc3545;
    color: #721c24;
}

#messageBox.success {
    background: #d4edda;
    border-color: #28a745;
    color: #155724;
}

#messageBox.info {
    background: #d1ecf1;
    border-color: #17a2b8;
    color: #0c5460;
}
</style>

</head>
<body>

<div class="header">
    🚍 Driver Panel
</div>

<!-- MESSAGE BOX -->
<div id="messageBox"></div>

<!-- 🔥 PASSENGER REQUESTS -->
<div class="requests">
    <h3>📢 Passenger Requests</h3>
    <div id="requestList">Loading requests...</div>
</div>

<!-- 🛑 ROUTE -->
<div class="route">
    <b>Route:</b><br>
    <button onclick="setRoute('Busstation')" id="busBtn">Busstation</button>
    <button onclick="setRoute('Destination')" id="destBtn">Destination</button>
</div>

<!-- 💰 TARIFF BOARD -->
<div class="board">
    <button onclick="tapFare(2.00)">2.00</button>
    <button onclick="tapFare(2.70)">2.70</button>
    <button onclick="tapFare(2.90)">2.90</button>
    <button onclick="tapFare(3.20)">3.20</button>
    <button onclick="tapFare(3.50)">3.50</button>
</div>

<!-- 📊 LIVE STATUS -->
<div class="status" id="status">
    Passengers: 0 | Income: 0
</div>

<script>

// 🔥 YOUR URL HERE - ONLY ONE PLACE
const API_URL = "https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec";

let currentRoute = "Busstation";
let passengers = 0;
let income = 0;
let lastRequests = [];

function showMessage(text, type = "info") {
    const box = document.getElementById("messageBox");
    box.style.display = "block";
    box.className = type;
    box.innerHTML = text;
    
    // Auto-hide after 10 seconds for success/info
    if (type !== "error") {
        setTimeout(() => {
            box.style.display = "none";
        }, 10000);
    }
}

/* ✅ ROUTE SELECT */
function setRoute(route) {
    currentRoute = route;
    const bus = document.getElementById("busBtn");
    const dest = document.getElementById("destBtn");
    bus.classList.remove("active-route");
    dest.classList.remove("active-route");
    if(route === "Busstation"){
        bus.classList.add("active-route");
    } else {
        dest.classList.add("active-route");
    }
    showMessage("Route changed to: " + route, "info");
}

/* ✅ TAP PASSENGER */
function tapFare(fare) {
    passengers++;
    income += fare;
    document.getElementById("status").innerText =
        `Passengers: ${passengers} | Income: ${income.toFixed(2)}`;

    showMessage("Tapping fare: " + fare, "info");
    
    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            type: "tap",
            tariff: fare,
            route: currentRoute
        })
    })
    .then(res => res.json())
    .then(data => {
        showMessage("✅ Tap recorded: " + fare, "success");
    })
    .catch(error => {
        showMessage("❌ Tap failed: " + error.message, "error");
    });
}

/* ✅ LOAD REQUESTS */
async function loadRequests() {
    try {
        const res = await fetch(API_URL);
        
        if (!res.ok) {
            throw new Error('HTTP ' + res.status);
        }
        
        const data = await res.json();

        const list = document.getElementById("requestList");

        if (!data || data.length === 0) {
            list.innerHTML = "✅ No active requests";
            return;
        }

        // Only show requests with NO response yet
        const activeRequests = data.filter(req => !req.response || req.response === "");
        
        if (activeRequests.length === 0) {
            list.innerHTML = "✅ No pending requests";
            return;
        }

        lastRequests = activeRequests;
        let html = "";
        activeRequests.slice(0, 10).forEach((req, index) => {
            html += `
                <div class="request-card">
                    📍 ${req.from} → ${req.to}<br>
                    ⏱ ${timeAgo(req.time)}
                    <div class="request-buttons">
                        <button class="wait-btn" onclick="respond('wait', ${index})">✅ WAIT</button>
                        <button class="pass-btn" onclick="respond('pass', ${index})">❌ PASS</button>
                    </div>
                </div>
            `;
        });
        list.innerHTML = html;

    } catch(e) {
        showMessage("❌ Error loading: " + e.message, "error");
        document.getElementById("requestList").innerHTML = 
            '❌ Error loading: ' + e.message;
    }
}

function timeAgo(timestamp) {
    if (!timestamp) return "Just now";
    const now = new Date();
    const past = new Date(timestamp);
    const diffMinutes = Math.floor((now - past) / 1000 / 60);
    if (diffMinutes < 1) return "Just now";
    if (diffMinutes === 1) return "1 min ago";
    return `${diffMinutes} mins ago`;
}

/* ✅ DRIVER RESPONSE */
function respond(type, index) {
    const req = lastRequests[index];
    if (!req) {
        showMessage("⚠️ Request not found", "error");
        return;
    }

    showMessage("Responding to: " + req.from + " → " + req.to, "info");

    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            type: "response",
            time: req.time,
            response: type
        })
    })
    .then(res => res.json())
    .then(data => {
        showMessage("✅ Response sent: " + (type === "wait" ? "WAIT" : "PASS"), "success");
        alert(type === "wait" ? "✅ You are going this way" : "❌ Skipped request");
        loadRequests();
    })
    .catch(error => {
        showMessage("❌ Response failed: " + error.message, "error");
        alert("⚠️ Error: " + error.message);
    });
}

/* ✅ TEST REQUEST */
function testRequest() {
    showMessage("Sending test request...", "info");
    
    fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            type: "request",
            from: "Saliña",
            to: "Punda"
        })
    })
    .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
    })
    .then(data => {
        showMessage("✅ Test request sent successfully!", "success");
        alert("✅ Test request sent!");
        loadRequests();
    })
    .catch(error => {
        showMessage("❌ Test failed: " + error.message + ". Check script deployment.", "error");
        alert("⚠️ Error: " + error.message + "\n\nCheck:\n1. Script is deployed as web app\n2. URL is correct\n3. Sheet 'requests' exists");
    });
}

/* ✅ INIT */
showMessage("🚍 Driver panel started. Checking requests...", "info");

setInterval(loadRequests, 5000);
loadRequests();
setRoute("Busstation");

// Add test button
const testBtn = document.createElement('button');
testBtn.innerHTML = '🧪 Test Request';
testBtn.style.cssText = 'position:fixed; bottom:10px; right:10px; padding:10px 20px; background:#ffd700; border:none; border-radius:8px; font-weight:bold; cursor:pointer; z-index:999; box-shadow: 0 2px 8px rgba(0,0,0,0.2);';
testBtn.onclick = testRequest;
document.body.appendChild(testBtn);

</script>
</body>
</html>

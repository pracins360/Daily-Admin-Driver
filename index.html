<script>

let currentRoute = "Busstation";
let passengers = 0;
let income = 0;

/* ✅ ROUTE SELECT */
function setRoute(route) {
    currentRoute = route;

    const bus = document.getElementById("busBtn");
    const dest = document.getElementById("destBtn");

    bus.classList.remove("active-route");
    dest.classList.remove("active-route");

    if(route === "Busstation"){
        bus.classList.add("active-route");
    } else {
        dest.classList.add("active-route");
    }
}

/* ✅ TAP PASSENGER */
function tapFare(fare) {
    passengers++;
    income += fare;

    document.getElementById("status").innerText =
        `Passengers: ${passengers} | Income: ${income.toFixed(2)}`;

    fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec", {
        method: "POST",
        body: JSON.stringify({
            type: "tap",
            tariff: fare,
            route: currentRoute
        })
    });
}

/* ✅ LOAD REQUESTS */
async function loadRequests() {
    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec");
        const data = await res.json();

        const list = document.getElementById("requestList");

        let html = "";

        if (data.length === 0) {
            list.innerHTML = "No active requests";
            return;
        }

        data.slice(0,5).forEach((req, index) => {
            html += `
                <div class="request-card">
                    📍 ${req.from} → ${req.to}<br>
                    ⏱ ${timeAgo(req.time)}

                    <div class="request-buttons">
                        <button class="wait-btn" onclick="respond('wait', ${index})">WAIT</button>
                        <button class="pass-btn" onclick="respond('pass', ${index})">PASS</button>
                    </div>
                </div>
            `;
        });

        list.innerHTML = html;

    } catch(e) {
        document.getElementById("requestList").innerText = "Error loading requests";
    }
}

/* ✅ TIME FORMAT */
function timeAgo(time) {
    const now = new Date();
    const t = new Date(time);
    const diff = Math.floor((now - t) / 60000);
    return diff + " min ago";
}

/* ✅ DRIVER RESPONSE */
function respond(type, id) {
    if(type === "wait"){
        alert("✅ You are going this way");
    } else {
        alert("❌ Skipped request");
    }
}

/* ✅ TEST REQUEST */
function testRequest() {
    fetch("https://script.google.com/macros/s/AKfycbxaO9s7bbrY-riIXoJQMcVFSVDAumoCBch-X3pcLOHcEJNxMQDDbuVoTziHThYcd64X/exec", {
        method: "POST",
        body: JSON.stringify({
            type: "request",
            from: "Saliña",
            to: "Punda"
        })
    });

    alert("✅ Test request sent!");
}

/* ✅ AUTO LOAD */
setInterval(loadRequests, 10000);
loadRequests();
setRoute("Busstation");

</script>
